<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - FlowCare</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<div class="container">

  <h2>Settings</h2>

  <!-- PROFILE -->
  <div class="card">
    <p>👤 Name</p>
    <input type="text" id="username" placeholder="Enter your name">
  </div>

  <div class="card">
      <label>Age</label>
        <input type="number" id="ageInput" placeholder="Enter your age">
        </div>

  <!-- CYCLE SETTINGS -->
  <div class="card">
    <p>📊 Cycle Length (days)</p>
    <input type="number" id="cycleLength" value="28">
  </div>

  <!-- NOTIFICATIONS -->
  <div class="card">
    <p>🔔 Notifications</p>
    <label>
      <input type="checkbox" id="notifToggle"> Enable Notifications
    </label>
  </div>

  <!-- PRIVACY -->
  <div class="card">
    <p>🔒 Privacy</p>
    <button onclick="setPIN()">Set App PIN</button>
  </div>

  <!-- RESET -->
  <div class="card">
    <p>⚠️ Danger Zone</p>
    <button onclick="resetData()">Reset All Data</button>
    </div>
    <div class="card">
      <p>🚪 On Your Way Out</p>
    <button onclick="logout()">Logout</button>
  </div>

</div>

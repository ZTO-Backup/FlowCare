<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - FlowCare</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
  <div class="header-inner">

    <div class="page-header">
      <div class="page-icon">⚙️</div>

      <div>
        <h2 class="page-title">Settings</h2>
        <p class="page-sub">Control your experience with ease ✨</p>
      </div>
    </div>

  </div>
</div>

<!-- 🔥 MAIN -->
<div class="container">

  <!-- PROFILE -->
  <div class="card">
    <p class="text-sm">👤 Name</p>
    <input type="text" id="username" placeholder="Enter your name">
  </div>

  <div class="card">
    <p class="text-sm">🎂 Age</p>
    <input type="number" id="ageInput" placeholder="Enter your age">
  </div>

  <!-- CYCLE -->
  <div class="card">
    <p class="text-sm">📊 Cycle Length (days)</p>
    <input type="number" id="cycleLength" value="28">
  </div>

  <!-- NOTIFICATIONS -->
  <div class="card">
    <p class="text-sm">🔔 Notifications</p>
    <label class="text-sm">
      <input type="checkbox" id="notifToggle"> Enable Notifications
    </label>
  </div>

  <!-- PRIVACY -->
  <div class="card">
    <p class="text-sm">🔒 Privacy</p>
    <button onclick="setPIN()">Set App PIN</button>
  </div>

  <!-- DANGER -->
  <div class="card">
    <p class="text-sm text-danger">⚠️ Danger Zone</p>
    <button onclick="resetData()">Reset All Data</button>
  </div>

  <!-- LOGOUT -->
  <div class="card">
    <p class="text-sm">🚪 On Your Way Out</p>
    <button onclick="confirmLogout()">Logout</button>
  </div>

  <!-- ✅ CONFIRM BOX (INSIDE CONTAINER) -->
  <div id="logoutConfirmBox" class="card highlight" style="display:none;">
    <p>⚠️ Are you sure you want to logout?</p>
    
    <button onclick="finalLogout()">Yes, Logout</button>
    <button onclick="hideLogoutBox()" style="margin-top:8px;">Cancel</button>
  </div>

</div>

<!-- 📱 NAVIGATION -->
<div class="nav">
  
  <a href="index.html" class="nav-item">
    <span>🏠</span>
    <small>Home</small>
  </a>
  
  <a href="calendar.html" class="nav-item">
    <span>📅</span>
    <small>Calendar</small>
  </a>
  
  <a href="log.html" class="nav-item center">
    <span>＋</span>
  </a>
  
  <a href="insights.html" class="nav-item">
    <span>📊</span>
    <small>Insights</small>
  </a>
  
  <a href="settings.html" class="nav-item active">
    <span>⚙️</span>
    <small>Settings</small>
  </a>
  
</div>

<!-- SCRIPTS -->
<script src="js/auth.js"></script>
<script>
  protectPage();
</script>
<script src="js/settings.js"></script>
<script src="js/lock.js"></script>

</body>
</html>

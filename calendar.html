<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar - FlowCare</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<div class="container">
  
<!-- 🧠 AI Status (Dynamic) -->
<div class="card premium-card warning-card">
  <p id="cycleWarning"></p>
  <small id="confidenceText"></small>
</div>

<!-- 🔥 AI Insights Marquee -->
<div class="card premium-card marquee">
  <div class="marquee-track">
    <span id="marqueeText"></span>
    <span id="marqueeClone"></span>
  </div>
</div>

<div class="card premium-card cycle-card">
<p id="cycleDay"></p>
<p id="nextPeriod"></p>
  </div>

  <!-- 📅 HEADER -->
<div class="header-row">
<button class="nav-btn" onclick="prevMonth()">‹</button>
<h2 id="monthYear"></h2>
<button class="nav-btn" onclick="nextMonth()">›</button>
</div>
  
  <!-- 📆 CALENDAR -->
  <div class="calendar premium-calendar" id="calendar"></div>
  
  <!-- 📊 LEGEND -->
<div class="card premium-card legend">
<div><span class="dot safe"></span> Safe</div>
<div><span class="dot fertile"></span> Fertile</div>
<div><span class="dot ovulation"></span> Ovulation</div>
<div><span class="dot unknown"></span> Not Sure</div>
</div>
  
  <!-- 📌 ACTION -->
<div class="card premium-card">
  <p id="selectedDate">Select a day</p>
  <p id="dayInfo" style="margin-top:8px; font-size:14px;"></p>
  <button id="logBtn">Log for this day</button>
</div>
  
</div>

<!-- 📱 NAVIGATION -->
<div class="nav">
  
  <a href="index.html" class="nav-item active">
    <span>🏠</span>
    <small>Home</small>
  </a>
  
  <a href="calendar.html" class="nav-item">
    <span>📅</span>
    <small>Calendar</small>
  </a>
  
  <a href="log.html" class="nav-item center">
    <span>＋</span>
  </a>
  
  <a href="insights.html" class="nav-item">
    <span>📊</span>
    <small>Insights</small>
  </a>
  
  <a href="settings.html" class="nav-item">
    <span>⚙️</span>
    <small>Settings</small>
  </a>
  
</div>

<script src="js/auth.js"></script>
<script>
  protectPage();
</script>
<script src="js/app.js"></script>
<script src="js/calendar.js"></script>

</body>
</html>

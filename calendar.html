<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar - FlowCare</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<div class="container">
  
  <!-- 🧠 AI STATUS -->
  <div class="card premium-card warning-card">
    <p id="cycleWarning"></p>
  </div>
  
  <!-- 📅 HEADER -->
  <div class="header-row">
    <button class="nav-btn" onclick="prevMonth()">◀</button>
    <h2 id="monthYear"></h2>
    <button class="nav-btn" onclick="nextMonth()">▶</button>
  </div>
  
  <!-- 📆 CALENDAR -->
  <div class="calendar premium-calendar" id="calendar"></div>
  
  <!-- 📊 LEGEND -->
<div class="card premium-card legend">
<div><span class="dot safe"></span> Safe</div>
<div><span class="dot fertile"></span> Fertile</div>
<div><span class="dot ovulation"></span> Ovulation</div>
<div><span class="dot unknown"></span> Not Sure</div>
</div>
  
  <!-- 📌 ACTION -->
  <div class="card premium-card">
    <p id="selectedDate">Select a day</p>
    <button id="logBtn">Log for this day</button>
  </div>
  
</div>

<!-- 🔻 NAV -->
<div class="nav">
  <a href="index.html">Home</a>
  <a href="calendar.html" class="active">Calendar</a>
  <a href="log.html">Log</a>
  <a href="insights.html">Insights</a>
  <a href="settings.html">Settings</a>
</div>

<script src="js/auth.js"></script>
<script>
  protectPage();
</script>
<script src="js/calendar.js"></script>
<script src="js/lock.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar - FlowCare</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

  <div class="card">
      <p id="cycleWarning"></p>
      </div>

<div class="container">

  <!-- HEADER -->
  <h2 id="monthYear"></h2>

  <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:10px;">
    <button onclick="prevMonth()">◀</button>
    <span></span>
    <button onclick="nextMonth()">▶</button>
  </div>

  <!-- CALENDAR -->
  <div class="calendar" id="calendar"></div>

  <!-- ✅ LEGEND (ADDED HERE) -->
  <div class="card">
    <p>🟢 Safe Days</p>
    <p>🔴 Fertile Days</p>
    <p>🌼 Ovulation</p>
  </div>

  <!-- ACTION -->
  <div class="card">
    <p id="selectedDate">Select a day</p>
    <button id="logBtn">Log for this day</button>
  </div>

</div>

<!-- NAV -->
<div class="nav">

  <a href="calendar.html" class="active">Calendar</a>
  <a href="log.html">Log</a>

</div>

  protectPage();

</body>
</html>

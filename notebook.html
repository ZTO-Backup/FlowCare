<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook - FlowCare</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
  <div class="header-inner">

    <div class="page-header">
      <div class="page-icon">📓</div>

      <div>
        <h2 class="page-title">Notebook</h2>
        <p class="page-sub">Capture your thoughts & patterns 💖</p>
      </div>
    </div>

  </div>
</div>

<!-- 🔥 MAIN -->
<div class="container">

  <!-- FORM -->
  <div class="card">

    <p class="text-sm">📅 Date</p>
    <input type="date" id="noteDate">

    <p class="text-sm">🩸 Period Started?</p>
    <select id="periodStart">
      <option value="no">No</option>
      <option value="yes">Yes</option>
    </select>

    <p class="text-sm">😊 Mood</p>
    <select id="noteMood">
      <option value="happy">Happy</option>
      <option value="neutral">Neutral</option>
      <option value="sad">Sad</option>
      <option value="irritated">Irritated</option>
    </select>

    <p class="text-sm">💊 Symptoms</p>
    <input type="text" id="noteSymptoms" placeholder="e.g cramps, headache">

    <p class="text-sm">📝 Notes</p>
    <textarea id="noteText" placeholder="Write anything..."></textarea>

    <button onclick="saveNote()">✨ Save Note</button>

  </div>

  <!-- LIST -->
  <div id="notesList"></div>

</div>

<!-- 📱 NAVIGATION -->
<div class="nav">
  
  <a href="index.html" class="nav-item">
    <span>🏠</span>
    <small>Home</small>
  </a>
  
  <a href="calendar.html" class="nav-item">
    <span>📅</span>
    <small>Calendar</small>
  </a>
  
  <a href="log.html" class="nav-item center">
    <span>＋</span>
  </a>
  
  <a href="insights.html" class="nav-item">
    <span>📊</span>
    <small>Insights</small>
  </a>
  
  <a href="settings.html" class="nav-item">
    <span>⚙️</span>
    <small>Settings</small>
  </a>
  
</div>

<script src="js/auth.js"></script>
<script>
  protectPage();
</script>
<script src="js/notebook.js"></script>

</body>
</html>

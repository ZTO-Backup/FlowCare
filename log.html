<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log - FlowCare</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
  <div class="header-inner">

    <div class="page-header">
      <div class="page-icon">🩸</div>

      <div>
        <h2 class="page-title" id="logTitle">Log Today</h2>
        <p class="page-sub">Track how your body feels today 💖</p>
      </div>
    </div>

  </div>
</div>

<!-- 🔥 MAIN -->
<div class="container">

  <!-- FLOW -->
  <div class="card">
    <p class="text-sm">🩸 Flow</p>
    <select id="flow">
      <option value="none">None</option>
      <option value="light">Light</option>
      <option value="medium">Medium</option>
      <option value="heavy">Heavy</option>
    </select>
  </div>

  <!-- SYMPTOMS -->
  <div class="card">
    <p class="text-sm">😣 Symptoms</p>

    <div class="chip-group">
      <label class="chip"><input type="checkbox" value="cramps"> Cramps</label>
      <label class="chip"><input type="checkbox" value="headache"> Headache</label>
      <label class="chip"><input type="checkbox" value="fatigue"> Fatigue</label>
      <label class="chip"><input type="checkbox" value="bloating"> Bloating</label>
    </div>
  </div>

  <!-- MOOD -->
  <div class="card">
    <p class="text-sm">😊 Mood</p>
    <select id="mood">
      <option value="happy">Happy 😊</option>
      <option value="neutral">Neutral 😐</option>
      <option value="sad">Sad 😔</option>
      <option value="irritated">Irritated 😤</option>
    </select>
  </div>

  <!-- PADS -->
  <div class="card">
    <p class="text-sm">🧻 Pads Used</p>
    <input type="number" id="pads" min="0" max="10" value="0">
  </div>

  <!-- SAVE BUTTON -->
  <div class="card" style="text-align:center;">
    <button onclick="saveLog()">✨ Save Entry</button>
  </div>

</div>

<!-- 📱 NAVIGATION -->
<div class="nav">
  
  <a href="index.html" class="nav-item">
    <span>🏠</span>
    <small>Home</small>
  </a>
  
  <a href="calendar.html" class="nav-item">
    <span>📅</span>
    <small>Calendar</small>
  </a>
  
  <a href="log.html" class="nav-item center active">
    <span>＋</span>
  </a>
  
  <a href="insights.html" class="nav-item">
    <span>📊</span>
    <small>Insights</small>
  </a>
  
  <a href="settings.html" class="nav-item">
    <span>⚙️</span>
    <small>Settings</small>
  </a>
  
</div>

<script src="js/auth.js"></script>
<script>
  protectPage();
</script>
<script src="js/log.js"></script>
<script src="js/lock.js"></script>

</body>
</html>
